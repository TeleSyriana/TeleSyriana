name: Phase 1 static preflight

on:
  pull_request:
    branches: [main]
    paths:
      - 'app.js'
      - 'app-core.js'
      - 'employee-directory.js'
      - 'employee-directory-core.js'
      - 'employees-ui.js'
      - 'employees-ui-core.js'
      - 'tickets.js'
      - 'tickets-core.js'
      - 'payroll.js'
      - 'payroll-core.js'
      - 'reports.js'
      - 'reports-core.js'
      - 'messages.js'
      - 'messages-core.js'
      - 'groups.js'
      - 'groups-core.js'
      - 'tools/phase1-static-preflight.mjs'
      - '.github/workflows/phase1-static-preflight.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-preflight:
    name: Validate Phase 1 migration loaders
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run deterministic preflight
        id: preflight
        shell: bash
        continue-on-error: true
        run: |
          set +e
          node tools/phase1-static-preflight.mjs > phase1-preflight.log 2>&1
          code=$?
          cat phase1-preflight.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload preflight output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase1-static-preflight-output
          path: phase1-preflight.log
          if-no-files-found: error
          retention-days: 7

      - name: Read-only Firestore employee probe
        if: steps.preflight.outputs.exit_code == '0'
        shell: bash
        run: |
          set -euo pipefail
          url='https://firestore.googleapis.com/v1/projects/telesyriana-ccms/databases/(default)/documents/employees/__telesyriana_phase1_read_probe__?key=AIzaSyDSvgD5GEZRE_zBzspoPr3pHQW1XOZr6yQ'
          code="$(curl --silent --show-error --output firestore-read-probe.json --write-out '%{http_code}' "$url")"
          echo "Firestore employee read probe HTTP status: $code"
          case "$code" in
            200|404)
              echo 'Read access reached Firestore successfully; probe document was either readable or correctly absent.'
              ;;
            *)
              echo 'Firestore employee read probe failed:' >&2
              cat firestore-read-probe.json >&2 || true
              exit 1
              ;;
          esac

      - name: Fail when preflight failed
        if: steps.preflight.outputs.exit_code != '0'
        shell: bash
        run: |
          cat phase1-preflight.log
          exit 1
