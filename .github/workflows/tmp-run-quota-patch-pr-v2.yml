name: Temporary quota patch PR runner v4

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/firestore-quota-hotfix-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/firestore-quota-hotfix-v1
          fetch-depth: 0

      - name: Fix Messages quota lifecycle ordering
        run: python tools/fix-quota-hotfix-messages.py

      - name: Syntax check patched stable cores
        run: |
          cp app-core.js /tmp/app-core.mjs
          cp messages-core.js /tmp/messages-core.mjs
          cp groups-core.js /tmp/groups-core.mjs
          node --check /tmp/app-core.mjs
          node --check /tmp/messages-core.mjs
          node --check /tmp/groups-core.mjs

      - name: Verify quota lifecycle after repair
        shell: bash
        run: |
          grep -q 'setInterval(() => updatePresence(false), 60_000)' app-core.js
          grep -q 'function syncHomeRealtimeListeners' app-core.js
          grep -q 'where("status", "in"' app-core.js
          grep -q 'function messagesPageIsActive' messages-core.js
          grep -q 'function stopMessagesPageRealtime' messages-core.js
          grep -q 'subscribeGroupsCloud();' messages-core.js
          grep -q 'subscribeRecentsCloud();' messages-core.js
          grep -q 'function groupsMessagesPageIsActive' groups-core.js
          python - <<'PY'
          from pathlib import Path
          s = Path('messages-core.js').read_text()
          a = s.index('function syncMessagesPageRealtime()')
          b = s.index('// ---------------- init ----------------', a)
          helper = s[a:b]
          if 'syncMessagesPageRealtime();' in helper:
              raise SystemExit('Messages helper recursion is still present')
          print('Messages helper recursion check: PASS')
          PY

      - name: Commit repaired stable core
        run: |
          git config user.name 'TeleSyriana Quota Hotfix'
          git config user.email 'actions@users.noreply.github.com'
          git add messages-core.js
          if git diff --cached --quiet; then
            echo 'No repair changes to commit.'
            exit 0
          fi
          git commit -m '[quota-patch] fix Messages page-aware lifecycle'
          git push origin HEAD:agent/firestore-quota-hotfix-v1
