name: Temporary quota patch PR runner v2

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/firestore-quota-hotfix-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/firestore-quota-hotfix-v1
          fetch-depth: 0
      - name: Apply deterministic quota patch v2
        run: python tools/apply-quota-hotfix-v2.py
      - name: Syntax check patched stable cores
        run: |
          cp app-core.js /tmp/app-core.mjs
          cp messages-core.js /tmp/messages-core.mjs
          cp groups-core.js /tmp/groups-core.mjs
          node --check /tmp/app-core.mjs
          node --check /tmp/messages-core.mjs
          node --check /tmp/groups-core.mjs
      - name: Commit patched cores
        run: |
          git config user.name 'TeleSyriana Quota Hotfix'
          git config user.email 'actions@users.noreply.github.com'
          git add app-core.js messages-core.js groups-core.js
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git commit -m '[quota-patch] reduce always-on Firestore listeners'
          git push origin HEAD:agent/firestore-quota-hotfix-v1
