name: Temporary quota patch PR runner v2

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/firestore-quota-hotfix-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/firestore-quota-hotfix-v1
          fetch-depth: 0

      - name: Count exact quota patch markers
        shell: python
        run: |
          from pathlib import Path

          checks = []
          app = Path('app-core.js').read_text()
          msg = Path('messages-core.js').read_text()
          grp = Path('groups-core.js').read_text()

          checks.append(('app presence lifecycle', app.count('''function startPresence() {\n  if (!currentUser) return;\n  subscribePresence();\n  updatePresence(true);\n  if (presenceTimerId) clearInterval(presenceTimerId);\n  presenceTimerId = setInterval(() => updatePresence(false), 30_000);\n}''')))
          checks.append(('management issue calendar full collection', app.count('if (role !== "agent") return [{ key: "team", source: base }];')))
          checks.append(('app page switch presence marker', app.count('  updatePresence(false).catch(() => {});\n  try { translateFeaturePages(getLanguage()); applyPhase21LanguagePolish(getLanguage()); setTimeout(() => applyPhase21LanguagePolish(getLanguage()), 80); } catch {}')))

          checks.append(('messages unread watcher registration', msg.count('  updateBadgesForRoom(key);\n  ensureUnreadWatcher(key);')))
          checks.append(('messages init marker', msg.count('// ---------------- init ----------------\n')))
          checks.append(('messages initial presence/profile', msg.count('  setCurrentUser();\n  subscribePresenceSidebar();\n  subscribeProfilesSidebar();\n  applyProfileAvatars();')))
          checks.append(('messages groups/recents pair', msg.count('  subscribeGroupsCloud();\n  subscribeRecentsCloud();')))
          checks.append(('messages nav lifecycle', msg.count('''  document.querySelectorAll(".nav-link[data-page]").forEach((btn) => {\n    btn.addEventListener("click", () => {\n      if (btn.dataset.page !== "messages") document.body.classList.remove("chat-open");\n    });\n  });''')))
          checks.append(('messages status listener end', msg.count('  subscribeالحالةDots();\n});')))
          checks.append(('messages user-change listener bundle', msg.count('''  subscribeGroupsCloud();\n  subscribeRecentsCloud();\n  subscribeالحالةDots();\n  subscribeProfilesSidebar();\n  applyProfileAvatars();\n  applyBirthdayBadges();\n  applyProfileAvatars();''')))

          checks.append(('groups startup/user-change tail', grp.count('''document.addEventListener("DOMContentLoaded", () => {\n  hookMemberSearch();\n  hookUI();\n  subscribeGroupsList();\n});\n\nwindow.addEventListener("telesyriana:user-changed", () => {\n  applySupervisorVisibility();\n  subscribeGroupsList();\n});''')))

          bad = False
          for label, count in checks:
              print(f'{label}: {count}')
              if label == 'messages groups/recents pair':
                  if count < 1: bad = True
              elif count != 1:
                  bad = True

          if bad:
              raise SystemExit('One or more exact marker counts are unexpected.')

          print('All marker counts are suitable for the deterministic patch.')
