name: Temporary quota patch runner v6

on:
  push:
    branches: [agent/firestore-quota-hotfix-v2]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[quota-v2-patched]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/firestore-quota-hotfix-v2
          fetch-depth: 0

      - name: Apply Notes and Meetings quota lifecycle patch
        run: python tools/apply-quota-hotfix-tasks-meetings.py

      - name: Syntax check affected modules
        run: |
          cp tasks.js /tmp/tasks.mjs
          cp meetings.js /tmp/meetings.mjs
          node --check /tmp/tasks.mjs
          node --check /tmp/meetings.mjs

      - name: Verify page-scoped Firestore lifecycle
        shell: bash
        run: |
          grep -q 'function notesPageIsActive' tasks.js
          grep -q 'function stopNotesSubscription' tasks.js
          grep -q 'if (!notesPageIsActive())' tasks.js
          grep -q 'function meetingsPageIsActive' meetings.js
          grep -q 'function stopUpcomingSubscription' meetings.js
          grep -q 'function syncMeetingsPageRealtime' meetings.js
          python - <<'PY'
          from pathlib import Path
          tasks = Path('tasks.js').read_text()
          meetings = Path('meetings.js').read_text()
          if 'document.addEventListener("DOMContentLoaded", initNotes);' in tasks:
              raise SystemExit('Notes still uses unconditional legacy boot')
          init_pos = meetings.index('function initاجتماعs()')
          init_tail = meetings[init_pos:init_pos+2500]
          if '\n    subscribeUpcoming();\n' in init_tail:
              raise SystemExit('Meetings still subscribes unconditionally at init')
          print('Notes/Meetings hidden-page listener checks: PASS')
          PY

      - name: Commit Notes and Meetings quota hotfix
        run: |
          git config user.name 'TeleSyriana Quota Hotfix'
          git config user.email 'actions@users.noreply.github.com'
          git add tasks.js meetings.js
          if git diff --cached --quiet; then
            echo 'No Notes/Meetings changes to commit.'
            exit 0
          fi
          git commit -m '[quota-v2-patched] make Notes and Meetings page-scoped'
          git push origin HEAD:agent/firestore-quota-hotfix-v2
