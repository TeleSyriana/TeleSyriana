name: Startup loader dismissal staging patch

on:
  pull_request:
    branches: [agent/startup-loader-staging-base]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.head_ref == 'agent/startup-loader-dismiss-fix'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/startup-loader-dismiss-fix
          fetch-depth: 0

      - name: Detect patched source
        id: state
        shell: bash
        run: |
          if grep -q 'Home is the initial ready state' app-core.js; then
            echo 'patched=true' >> "$GITHUB_OUTPUT"
          else
            echo 'patched=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Apply loader dismissal patch
        if: steps.state.outputs.patched != 'true'
        run: python tools/fix-startup-loader-dismiss.py

      - name: Syntax check app core
        run: |
          cp app-core.js /tmp/app-core.mjs
          node --check /tmp/app-core.mjs
          grep -q 'hideAppLoading(200)' app-core.js
          grep -q 'Dashboard ready.' app-core.js

      - name: Browser smoke - dashboard dismisses startup loader
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/telesyriana-loader-test
          cd /tmp/telesyriana-loader-test
          npm init -y >/dev/null 2>&1
          npm install --no-audit --no-fund --silent puppeteer-core@24

          cd "$GITHUB_WORKSPACE"
          python3 -m http.server 4174 --bind 127.0.0.1 > /tmp/telesyriana-loader-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" >/dev/null 2>&1 || true' EXIT
          sleep 1

          cd /tmp/telesyriana-loader-test
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import puppeteer from 'puppeteer-core';

          const candidates = ['/usr/bin/google-chrome','/usr/bin/google-chrome-stable','/usr/bin/chromium-browser','/usr/bin/chromium'];
          const executablePath = candidates.find((p) => fs.existsSync(p));
          if (!executablePath) throw new Error('No Chrome/Chromium executable found.');

          const browser = await puppeteer.launch({ executablePath, headless: true, args: ['--no-sandbox','--disable-dev-shm-usage'] });
          try {
            const page = await browser.newPage();
            const pageErrors = [];
            page.on('pageerror', (e) => pageErrors.push(String(e?.stack || e)));
            await page.setRequestInterception(true);
            page.on('request', (request) => {
              const url = request.url();
              if (url.includes('firestore.googleapis.com') || url.includes('google.firestore.v1.Firestore')) request.abort();
              else request.continue();
            });

            await page.goto('http://127.0.0.1:4174/index.html', { waitUntil: 'domcontentloaded', timeout: 30000 });
            await new Promise((r) => setTimeout(r, 1200));
            await page.type('#ccmsId', '1001');
            await page.type('#password', '0951');
            await page.click('#login-form button[type="submit"]');
            await new Promise((r) => setTimeout(r, 3200));

            const result = await page.evaluate(() => {
              const loader = document.getElementById('app-startup-loader');
              return {
                dashboardVisible: document.getElementById('dashboard-screen')?.classList.contains('hidden') === false,
                loaderExists: Boolean(loader),
                loaderHidden: !loader || loader.classList.contains('hidden'),
                loaderPercent: document.getElementById('startup-loader-percent')?.textContent || '',
              };
            });
            console.log(JSON.stringify(result));
            if (!result.dashboardVisible) throw new Error('Dashboard did not open.');
            if (!result.loaderHidden) throw new Error(`Startup loader remained visible: ${JSON.stringify(result)}`);
            if (pageErrors.length) throw new Error(`Browser errors: ${pageErrors.join(' | ')}`);
          } finally {
            await browser.close();
          }
          NODE

      - name: Commit patched app core
        if: steps.state.outputs.patched != 'true'
        run: |
          git config user.name 'TeleSyriana Loader Fix'
          git config user.email 'actions@users.noreply.github.com'
          git add app-core.js
          git commit -m 'fix: dismiss startup loader when Home is ready'
          git push origin HEAD:agent/startup-loader-dismiss-fix
